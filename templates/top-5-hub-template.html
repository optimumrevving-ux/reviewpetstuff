<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{META_DESCRIPTION}}">
    <title>{{HUB_TITLE}} — Top 5 Compared (2026) | ReviewPetStuff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <div id="navbar"></div>

    <main class="max-w-screen-2xl mx-auto px-6 py-12">
        <!-- Hero -->
        <div class="max-w-4xl mx-auto text-center mb-16">
            <span class="uppercase text-emerald-400 tracking-widest text-sm font-medium">{{CATEGORY}} • 2026</span>
            <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter heading-font mt-4 leading-none">{{HUB_TITLE}}</h1>
            <p class="text-xl text-zinc-400 mt-6 max-w-2xl mx-auto">{{INTRO}}</p>
        </div>

        <!-- Stats Bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16 max-w-5xl mx-auto">
            <!-- 4 stat cards -->
        </div>

        <!-- Head-to-Head Table -->
        <div class="bg-zinc-900 rounded-3xl p-8 mb-20 overflow-x-auto">
            <h2 class="text-3xl font-semibold mb-8">Head-to-Head Comparison</h2>
            <table class="w-full min-w-[1000px]">
                <!-- Table with 8 columns: Product, Price/lb, Protein, Key Features, Rating, Best For, Buy -->
            </table>
        </div>

        <!-- Detailed Review Cards -->
        <h2 class="text-3xl font-semibold mb-10">Detailed Reviews</h2>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 5 review cards -->
        </div>

        <!-- Buying Guide -->
        <div class="mt-24 bg-zinc-900 rounded-3xl p-10">
            <h2 class="text-3xl font-semibold mb-8">Buying Guide: What to Look For</h2>
            <!-- Content -->
        </div>

        <!-- FAQ -->
        <div class="mt-24">
            <h2 class="text-3xl font-semibold mb-8">Frequently Asked Questions</h2>
            <!-- FAQ items -->
        </div>

        <!-- Related -->
        <div class="mt-24 bg-zinc-900 rounded-3xl p-10">
            <h3 class="text-2xl font-semibold mb-8">Related Reading</h3>
            <!-- Links -->
        </div>
    </main>

    <div id="footer"></div>

    <script>
        fetch('components/navbar.html').then(r => r.text()).then(h => document.getElementById('navbar').innerHTML = h);
        fetch('components/footer.html').then(r => r.text()).then(h => document.getElementById('footer').innerHTML = h);
    </script>
</body>
</html>
