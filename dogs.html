<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Reviews - ReviewPetStuff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col">
    
    <div id="navbar"></div>

    <header class="bg-gradient-to-br from-zinc-900 to-black py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-6xl font-bold tracking-tighter">Dog Product Reviews</h1>
            <p class="text-xl text-zinc-400 mt-4 max-w-2xl mx-auto">Raw diets, kibble, toys, dental care — tested honestly with real dogs.</p>
        </div>
    </header>

    <section class="flex-1 py-16">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="dogGrid">
                <!-- JS populated -->
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script>
        fetch('components/navbar.html').then(r => r.text()).then(h => document.getElementById('navbar').innerHTML = h);
        fetch('components/footer.html').then(r => r.text()).then(h => document.getElementById('footer').innerHTML = h);

        const dogReviews = [
            {title: "The Ultimate Guide to Choosing the Right Dog Food", url: "#", rating: "4.8"},
            {title: "Best Raw Diet Base Mixes 2025 Reviews", url: "#", rating: "4.9"},
            {title: "The Best Dog Toys for Every Breed", url: "#", rating: "4.5"},
            // Add more from your sitemap
        ];

        document.getElementById('dogGrid').innerHTML = dogReviews.map(r => `
            <a href="${r.url}" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 hover:border-emerald-500 transition-all group">
                <h3 class="font-semibold text-xl mb-3 group-hover:text-emerald-400">${r.title}</h3>
                <span class="text-emerald-400">${r.rating} ★</span>
            </a>
        `).join('');
    </script>
</body>
</html>
