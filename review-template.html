<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Honest review of [PRODUCT NAME] with real testing notes, pros/cons, star rating and buying advice. Updated 2026.">
    <title>[PRODUCT NAME] Review 2026 • Honest Rating | ReviewPetStuff</title>
    <link rel="canonical" href="https://reviewpetstuff.com/reviews/[slug].html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .tail-container { @apply bg-zinc-950 text-zinc-100; }
        .emerald-gradient { background: linear-gradient(90deg, #10b981, #14b8a6); }
        .star { color: #fbbf24; }
    </style>
</head>
<body class="tail-container font-sans" data-product-slug="hills-science-diet-adult-1-6">

    <div id="navbar"></div>

    <!-- BREADCRUMBS + MAIN CONTENT (same as before) -->
    <!-- ... keep your existing main content ... -->

    <!-- MID & BOTTOM CTAs will be auto-filled by JS -->

    <div id="footer"></div>

    <!-- Component Loader + Smart Affiliate Loader -->
    <script>
        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                const html = await res.text();
                document.getElementById(id).innerHTML = html;
            } catch (e) { console.error(`Failed to load ${file}`); }
        }

        async function loadAffiliateLinks() {
            const slug = document.body.getAttribute('data-product-slug');
            if (!slug) return;

            try {
                const res = await fetch('../products.json');
                const products = await res.json();
                const product = products[slug];
                if (!product) return;

                // Update both CTAs
                document.querySelectorAll('#mid-cta, #bottom-cta').forEach(link => {
                    if (product.amazon) {
                        link.href = product.amazon;
                        link.innerHTML = `<i class="fas fa-shopping-cart"></i> Check Best Price on Amazon`;
                    }
                });
            } catch (e) {
                console.error("Could not load products.json");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('navbar', '../components/navbar.html');
            loadComponent('footer', '../components/footer.html');
            loadAffiliateLinks();
        });
    </script>

    <script>
        console.log('%c✅ Review template with smart affiliate system loaded', 'color:#10b981; font-weight:bold');
    </script>
</body>
</html>
