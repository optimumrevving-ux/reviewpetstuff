<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Product Name] Review - ReviewPetStuff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col" data-product-slug="PUT-SLUG-HERE">

    <div id="navbar"></div>

    <main class="flex-1 max-w-4xl mx-auto px-6 py-12">
        <!-- Header -->
        <span class="inline-block px-4 py-2 bg-emerald-900 text-emerald-400 text-sm font-medium rounded-full mb-6">[Category] • [Month Year]</span>
        
        <h1 class="text-5xl md:text-6xl font-bold tracking-tighter leading-tight mb-8">[Full Product Name] Review</h1>
        
        <div class="flex items-center gap-x-8 mb-12">
            <div class="flex items-center gap-x-3">
                <span class="text-5xl">★★★★☆</span>
                <div>
                    <span class="block text-3xl font-semibold text-emerald-400">4.7</span>
                    <span class="text-sm text-zinc-400">Overall Score</span>
                </div>
            </div>
            <div class="h-12 w-px bg-zinc-800"></div>
            <div class="text-zinc-400">Honest • Independent • Real Pet Tested</div>
        </div>

        <!-- Hero Image -->
        <img src="images/products/[slug].jpg" alt="[Product Name]" class="w-full rounded-3xl mb-12">

        <!-- Verdict -->
        <div class="bg-emerald-950 border border-emerald-800 rounded-3xl p-8 mb-12">
            <h2 class="text-2xl font-semibold mb-4">Our Verdict</h2>
            <p class="text-lg">[Write your short verdict here]</p>
        </div>

        <!-- PRIMARY AFFILIATE CTA (Mid-article - strongest placement) -->
        <div id="affiliate-cta-primary" class="mt-12 mb-16 hidden p-10 bg-emerald-950 border border-emerald-800 rounded-3xl"></div>

        <!-- Pros / Cons -->
        <div class="grid md:grid-cols-2 gap-8 mb-16">
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h3 class="text-emerald-400 text-xl font-semibold mb-6">✅ PROS</h3>
                <ul class="space-y-4 text-zinc-300">
                    <!-- Add pros here -->
                    <li>• [Pro 1]</li>
                    <li>• [Pro 2]</li>
                </ul>
            </div>
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h3 class="text-rose-400 text-xl font-semibold mb-6">❌ CONS</h3>
                <ul class="space-y-4 text-zinc-300">
                    <!-- Add cons here -->
                    <li>• [Con 1]</li>
                    <li>• [Con 2]</li>
                </ul>
            </div>
        </div>

        <!-- Full Review Content -->
        <div class="prose prose-invert max-w-none text-zinc-300">
            <h2 class="text-3xl font-bold mb-8">Full Review</h2>
            <p>[Paste your detailed honest review here...]</p>
        </div>

        <!-- SECONDARY AFFILIATE CTA (Bottom of article) -->
        <div id="affiliate-cta-secondary" class="mt-20 hidden p-10 bg-zinc-900 rounded-3xl border border-emerald-900"></div>
    </main>

    <div id="footer"></div>

    <script>
        // Load navbar & footer
        fetch('components/navbar.html').then(r => r.text()).then(h => document.getElementById('navbar').innerHTML = h);
        fetch('components/footer.html').then(r => r.text()).then(h => document.getElementById('footer').innerHTML = h);

        // Smart Affiliate Loader
        async function loadAffiliateCTA() {
            const slug = document.body.getAttribute('data-product-slug');
            if (!slug) return;
            try {
                const res = await fetch('products.json');
                const data = await res.json();
                const product = data[slug];
                if (!product) return;

                const ctaHTML = `
                    <h3 class="text-2xl font-semibold mb-2 text-center">Ready to Buy?</h3>
                    <p class="text-center text-zinc-400 mb-8">Support honest reviews — no extra cost to you</p>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${product.amazon ? `
                        <a href="${product.amazon}" target="_blank" class="flex items-center justify-center gap-3 bg-[#FF9900] hover:bg-[#FF9900]/90 text-black font-semibold py-5 px-8 rounded-2xl transition-all">
                            <i class="fa-solid fa-cart-shopping"></i>
                            Buy on Amazon
                            ${product.note ? `<span class="text-xs bg-black/20 px-3 py-1 rounded-full">${product.note}</span>` : ''}
                        </a>` : ''}
                        
                        ${product.chewy ? `
                        <a href="${product.chewy}" target="_blank" class="flex items-center justify-center gap-3 border-2 border-zinc-700 hover:bg-zinc-800 font-semibold py-5 px-8 rounded-2xl transition-all">
                            <i class="fa-solid fa-paw"></i>
                            Buy on Chewy
                        </a>` : ''}
                    </div>
                    <p class="text-xs text-center text-zinc-500 mt-8">
                        As an Amazon Associate & Chewy affiliate we may earn from qualifying purchases. 
                        <a href="../disclosure.html" class="text-emerald-400 hover:underline">Full Disclosure</a>
                    </p>
                `;

                document.getElementById('affiliate-cta-primary').innerHTML = ctaHTML;
                document.getElementById('affiliate-cta-primary').classList.remove('hidden');

                document.getElementById('affiliate-cta-secondary').innerHTML = ctaHTML;
                document.getElementById('affiliate-cta-secondary').classList.remove('hidden');
            } catch(e) {}
        }

        window.onload = loadAffiliateCTA;
    </script>
</body>
</html>
