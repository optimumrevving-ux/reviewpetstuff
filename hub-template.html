<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{META_DESCRIPTION}}">
    <title>{{HUB_TITLE}} — Best Options Compared (2026) | ReviewPetStuff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- NAVBAR -->

    <main class="max-w-screen-2xl mx-auto px-6 py-12">
        <div class="max-w-4xl mx-auto text-center mb-16">
            <span class="uppercase text-emerald-400 tracking-widest text-sm font-medium">{{CATEGORY}} GUIDE</span>
            <h1 class="text-5xl md:text-6xl font-semibold tracking-tighter heading-font mt-4 leading-none">{{HUB_TITLE}}</h1>
            <p class="text-xl text-zinc-400 mt-6 max-w-2xl mx-auto">{{INTRO}}</p>
        </div>

        <!-- Comparison Table -->
        <div class="bg-zinc-900 rounded-3xl p-8 mb-20 overflow-x-auto">
            <h2 class="text-2xl font-semibold mb-8">Head-to-Head Comparison</h2>
            <table class="w-full min-w-[800px]">
                <!-- Dynamic table content injected here -->
            </table>
        </div>

        <!-- Featured Reviews Grid -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Review cards will be added here -->
        </div>

        <!-- Related Spokes / Internal Links -->
        <div class="mt-20 bg-zinc-900 rounded-3xl p-10">
            <h3 class="text-2xl font-semibold mb-6">Related Reading</h3>
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Internal links -->
            </div>
        </div>
    </main>

    <!-- FOOTER -->
</body>
</html>
